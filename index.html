<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neat Sipper — Unicorn Bourbons, One Pour at a Time</title>

  <!-- Open Graph / iMessage / Social Sharing -->

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.neatsipper.com/" />
  <meta property="og:title" content="Neat Sipper — Unicorn Bourbons, One Pour at a Time" />
  <meta property="og:description" content="ASMR-style pours, rare bottle hunts, and tasting notes from the hard-to-find bottles worth chasing." />
  <meta property="og:image" content="https://neatsipper.com/logo.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1200" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Neat Sipper — Unicorn Bourbons, One Pour at a Time" />
  <meta name="twitter:description" content="ASMR-style pours, rare bottle hunts, and tasting notes from the hard-to-find bottles worth chasing." />
  <meta name="twitter:image" content="https://neatsipper.com/logo.png" />

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,700;1,9..144,900&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; background: #f5edd8; }

    body {
      background: #f5edd8;
      color: #1a2654;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      line-height: 1.75;
      overflow-x: hidden;
    }

    body::before { display: none; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      background: rgba(245,237,216,0.95);
      border-bottom: 1px solid rgba(26,38,84,0.12);
      backdrop-filter: blur(8px);
    }

    .nav-logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a2654;
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 3rem; list-style: none; }

    .nav-links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #7a6548;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #8b1a2a; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 0 0 0 3rem;
      position: relative;
      overflow: hidden;
      background: #f5edd8;
    }

    .hero-bg { display: none; }
    .hero-glow { display: none; }

    .hero-left {
      padding: 8rem 4rem 6rem 0;
      position: relative;
      z-index: 2;
    }

    .hero-right {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-left: 1px solid rgba(26,38,84,0.1);
    }

    .hero-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #7a6548;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .hero-stripe {
      display: flex;
      height: 3px;
      width: 48px;
      gap: 2px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }
    .stripe-r { background: #8b1a2a; flex: 1; }
    .stripe-w { background: rgba(26,38,84,0.15); flex: 1; }
    .stripe-b { background: #1a2654; flex: 1; }

    .hero-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(3.8rem, 7vw, 7rem);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.025em;
      color: #1a2654;
      max-width: 600px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.4s;
    }

    .hero-title em { font-style: italic; color: #8b1a2a; }

    .hero-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: #7a6548;
      max-width: 400px;
      margin-top: 2rem;
      line-height: 1.8;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.65s;
    }

    .hero-ctas {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.85s;
    }

    .hero-divider {
      position: absolute;
      bottom: 3rem;
      left: 3rem;
      right: 3rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1.1s;
    }

    .hero-divider-line { flex: 1; height: 1px; background: rgba(26,38,84,0.12); }
    .hero-stat { text-align: center; }

    .hero-stat-num {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #8b1a2a;
      display: block;
    }

    .hero-stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a6548;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #1a2654;
      color: #f5edd8;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .btn-primary:hover { background: #8b1a2a; transform: translateY(-2px); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(26,38,84,0.3);
      color: #1a2654;
      background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .btn-ghost:hover { border-color: #8b1a2a; color: #8b1a2a; transform: translateY(-2px); }

    /* ── SECTION COMMON ── */
    section { padding: 7rem 3rem; position: relative; }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8b1a2a;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .section-label::before {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: #8b1a2a;
    }

    .section-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      color: #1a2654;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    .section-title em { font-style: italic; color: #8b1a2a; }

    .section-num {
      position: absolute;
      top: 4rem;
      right: 3rem;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 9rem;
      font-weight: 900;
      color: rgba(26,38,84,0.04);
      line-height: 1;
      letter-spacing: -0.04em;
      user-select: none;
      pointer-events: none;
    }

    /* ── ABOUT ── */
    #about { background: #f5edd8; }

    .about {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .about-visual { position: relative; }

    .about-img-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #ede5cc;
      border: 1px solid rgba(26,38,84,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #7a6548;
      position: relative;
      overflow: hidden;
    }

    .about-img-placeholder::before { display: none; }
    .glass-icon { font-size: 4rem; line-height: 1; }

    .about-img-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .about-accent-box {
      position: absolute;
      bottom: -1.5rem;
      right: -1.5rem;
      background: #1a2654;
      color: #f5edd8;
      padding: 1.2rem 1.5rem;
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      max-width: 200px;
      line-height: 1.4;
    }

    .about-text p {
      color: #3d2b14;
      font-size: 1rem;
      font-weight: 300;
      margin-bottom: 1.2rem;
      line-height: 1.8;
    }

    .about-text p strong { color: #1a2654; font-weight: 500; }

    /* ── FEATURED BOTTLES ── */
    .featured-section {
      background: #ede5cc;
      border-top: 1px solid rgba(26,38,84,0.1);
      border-bottom: 1px solid rgba(26,38,84,0.1);
      position: relative;
    }

    .featured-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 1200px;
      margin: 0 auto 3.5rem;
    }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(26,38,84,0.1);
    }

    .bottle-card {
      background: #f5edd8;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.25s;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .bottle-card:hover { background: #ede5cc; }

    .bottle-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: #8b1a2a;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .bottle-card:hover::after { transform: scaleX(1); }

    .bottle-lot {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(139,26,42,0.45);
      margin-bottom: 0.5rem;
    }

    .bottle-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a6548;
      margin-bottom: 1rem;
    }

    .bottle-name {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a2654;
      margin-bottom: 0.4rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .bottle-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      color: #7a6548;
      letter-spacing: 0.12em;
      margin-bottom: 1.5rem;
    }

    .bottle-notes {
      font-size: 0.92rem;
      font-weight: 300;
      color: #3d2b14;
      font-style: italic;
      line-height: 1.7;
    }

    .bottle-emoji { font-size: 2.2rem; margin-bottom: 1rem; display: block; }

    .bottle-rarity {
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(26,38,84,0.08);
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .bottle-rarity-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a6548;
      flex-shrink: 0;
    }

    .bottle-rarity-bar {
      flex: 1;
      height: 2px;
      background: rgba(26,38,84,0.1);
      position: relative;
    }

    .bottle-rarity-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: #8b1a2a;
      transition: width 1s ease;
    }

    /* ── CONTENT PILLARS ── */
    #content { background: #f5edd8; }
    .pillars { max-width: 1200px; margin: 0 auto; }

    .pillars-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      margin-top: 4rem;
      background: rgba(26,38,84,0.1);
    }

    .pillar {
      background: #f5edd8;
      padding: 2.5rem 2rem;
      border-bottom: 2px solid transparent;
      transition: border-color 0.25s, background 0.25s;
    }

    .pillar:hover { background: #ede5cc; border-bottom-color: #8b1a2a; }
    .pillar-icon { font-size: 1.8rem; margin-bottom: 1.5rem; display: block; }

    .pillar-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a2654;
      margin-bottom: 0.75rem;
    }

    .pillar-desc { font-size: 0.88rem; color: #7a6548; font-weight: 300; line-height: 1.7; }

    /* ── COLLAB ── */
    .collab { background: #1a2654; border-top: 1px solid rgba(26,38,84,0.3); }
    .collab .section-label { color: rgba(245,237,216,0.6); }
    .collab .section-label::before { background: rgba(245,237,216,0.4); }
    .collab .section-title { color: #f5edd8; }
    .collab .section-title em { color: #e8a87c; }
    .collab .section-num { color: rgba(245,237,216,0.04); }

    .collab-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
    }

    .collab-types {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: rgba(245,237,216,0.1);
    }

    .collab-type {
      background: #1a2654;
      padding: 1.1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.92rem;
      color: rgba(245,237,216,0.6);
      transition: background 0.2s, color 0.2s;
    }

    .collab-type:hover { background: #22305e; color: #f5edd8; }
    .collab-type-dot { width: 5px; height: 5px; border-radius: 50%; background: #e8a87c; flex-shrink: 0; }

    .form-field label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.5);
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      background: rgba(245,237,216,0.06);
      border: 1px solid rgba(245,237,216,0.15);
      color: #f5edd8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      appearance: none;
      width: 100%;
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus { border-color: #e8a87c; }

    .form-field input::placeholder,
    .form-field textarea::placeholder { color: rgba(245,237,216,0.3); font-style: italic; }

    .contact-form { display: flex; flex-direction: column; gap: 1.2rem; margin-top: 2.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .form-field { display: flex; flex-direction: column; gap: 0.4rem; }

    /* ── TICKER ── */
    .ticker-wrap {
      background: #1a2654;
      overflow: hidden;
      white-space: nowrap;
      padding: 0.8rem 0;
      border-top: 1px solid rgba(245,237,216,0.08);
      border-bottom: 1px solid rgba(245,237,216,0.08);
    }

    .ticker-track { display: inline-flex; animation: ticker 32s linear infinite; }
    .ticker-track:hover { animation-play-state: paused; }

    .ticker-item {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.45);
      padding: 0 2.5rem;
    }

    .ticker-sep { color: rgba(232,168,124,0.4); padding: 0 0.5rem; }

    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── SOCIAL BAR ── */
    .social-bar {
      background: #1a2654;
      padding: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      flex-wrap: wrap;
      border-top: 1px solid rgba(245,237,216,0.08);
    }

    .social-item { text-align: center; text-decoration: none; }

    .social-platform {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.45);
      display: block;
      margin-bottom: 0.3rem;
    }

    .social-handle {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f5edd8;
      display: block;
      transition: color 0.2s;
    }

    .social-item:hover .social-handle { color: #e8a87c; }

    .social-icon {
      display: block;
      margin: 0 auto 0.4rem;
      width: 20px;
      height: 20px;
      fill: rgba(245,237,216,0.45);
    }

    .social-item:hover .social-icon { fill: #e8a87c; }

    /* ── MCM DIVIDER ── */
    .mcm-divider-wrap { padding: 2rem 0; background: #f5edd8; }
    .mcm-divider {
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 3rem;
      max-width: 1260px;
      margin: 0 auto;
    }
    .mcm-divider-line { flex: 1; height: 1px; background: rgba(26,38,84,0.12); }
    .mcm-starburst { flex-shrink: 0; color: rgba(26,38,84,0.2); }

    /* ── ORBIT RINGS ── */
    .hero-orbit-wrap {
      position: absolute;
      right: -180px;
      top: 50%;
      transform: translateY(-50%);
      width: 640px;
      height: 640px;
      pointer-events: none;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards 1.2s;
    }

    .hero-orbit-svg { width: 100%; height: 100%; }

    /* ── FLOATING FOLLOW ── */
    .float-follow {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1a2654;
      color: #f5edd8;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.85rem 1.4rem;
      text-decoration: none;
      z-index: 999;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease, background 0.2s;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(26,38,84,0.2);
    }

    .float-follow.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .float-follow:hover { background: #8b1a2a; }

    /* ── HAMBURGER ── */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
      z-index: 200;
    }

    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: #1a2654;
      transition: all 0.3s ease;
    }

    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .nav-mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(245,237,216,0.97);
      z-index: 150;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
    }

    .nav-mobile-menu.open { display: flex; }

    .nav-mobile-menu a {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: #1a2654;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-mobile-menu a:hover { color: #8b1a2a; }

    @media (max-width: 768px) { .nav-hamburger { display: flex; } }

    /* ── FOOTER ── */
    footer {
      background: #1a2654;
      border-top: 1px solid rgba(245,237,216,0.08);
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f5edd8;
    }

    .footer-disclaimer {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: rgba(245,237,216,0.35);
      max-width: 500px;
      text-align: center;
    }

    .footer-copy {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      color: rgba(245,237,216,0.35);
    }

    /* ── REEL SECTION ── */
    .reel-section {
      background: #ede5cc;
      border-top: 1px solid rgba(26,38,84,0.1);
      padding: 5rem 3rem;
    }

    .reel-inner { max-width: 1200px; margin: 0 auto; }

    .reel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 3rem;
      background: rgba(26,38,84,0.1);
    }

    .reel-card {
      background: #f5edd8;
      aspect-ratio: 9/16;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s;
    }

    .reel-card:hover { background: #ede5cc; }

    .reel-card-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a6548;
      margin-top: 1rem;
    }

    .reel-card-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a2654;
      margin-top: 0.4rem;
      padding: 0 1rem;
      text-align: center;
      line-height: 1.3;
    }

    .reel-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(26,38,84,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .reel-card:hover .reel-play { border-color: #8b1a2a; background: rgba(139,26,42,0.05); }
    .reel-play svg { width: 18px; height: 18px; fill: #1a2654; margin-left: 3px; }
    .reel-card:hover .reel-play svg { fill: #8b1a2a; }

    /* ── SCROLL REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FEATURED SPUTNIK ── */
    .featured-sputnik {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.05;
      pointer-events: none;
    }

    /* ── MOBILE ── */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; padding: 7rem 1.5rem 5rem; min-height: auto; }
      .hero-left { padding: 0; }
      .hero-right { display: none; }
      .hero-divider { display: none; }
    }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { display: none; }
      section { padding: 5rem 1.5rem; }
      .about { grid-template-columns: 1fr; gap: 3rem; }
      .about-accent-box { display: none; }
      .featured-grid { grid-template-columns: 1fr; }
      .pillars-grid { grid-template-columns: 1fr 1fr; }
      .collab-inner { grid-template-columns: 1fr; gap: 3rem; }
      .form-row { grid-template-columns: 1fr; }
      .social-bar { gap: 2.5rem; padding: 2.5rem 1.5rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
      .featured-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .reel-section { padding: 4rem 1.5rem; }
      .reel-grid { grid-template-columns: 1fr; }
      .float-follow { bottom: 1.2rem; right: 1.2rem; }
      .section-num { display: none; }
      .mcm-divider { padding: 0 1.5rem; }
    }

</style>
</head>
